<!DOCTYPE html>
<html lang="en" > 
<head>
<meta charset = "UTF-8" >
<meta name ="viewport" content ="width=device-width, initial-scale=1.0" />
<title> AI Image Generator </title>
<link rel="stylesheet" href ="project1.css" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
<header class="head">
<div class="logo-wrapper">
    <h1>AI Image Generator</h1>
<button class="theme-toggle">
    <i class="fa-solid fa-moon" ></i>
</button>
</div>
</header>
 <div class="main-content">
    <form action="#" class="prompt-form">
        <div class="prompt-container">
            <textarea class="prompt-input" placeholder="describe your imagination in detail..." required autofocus></textarea>
        <button class="prompt-btn">
            <i class="fa-solid fa-dice"></i>
        </button>
        </div>
        <!--prompt actions/buttons -->
        <div class="prompt-btn">
            <div class="select-wrapper">
                <select name="" id="" class="custom-select">
                    <option value="prompthero/openjourney" Openjourney></option>
                    <option value="Black-forest0labs/FLUX.1-dev">FLUX.1-dev</option>.
                    <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL</option>
                    <option value="runwayml/stable-diffusion-v1-5">stable Diffusion v1.5</option>
                </select>
            </div>

            <div class="select-wrapper">
                <select name="" id="" class="custom-select">
                    <option value="prompthero/openjourney" Openjourney></option>
                    <option value="Black-forest0labs/FLUX.1-dev">FLUX.1-dev</option>.
                    <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL</option>
                    <option value="runwayml/stable-diffusion-v1-5">stable Diffusion v1.5</option>
                </select>
            </div>
            <button type="submit" class="generate-btn">
                <i class="fa-solid fa-wand-sparkles"></i>
                <h1>Generate Image</h1>
            </button>
        </div>
    </form>

</div>
</body>
</html>
